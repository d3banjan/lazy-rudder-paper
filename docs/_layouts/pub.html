<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="baseurl" content="{{ site.baseurl }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
  {% include katex.html %}
  <link rel="stylesheet" href="{{ '/assets/css/pub.css' | relative_url }}">
</head>
<body class="layout-pub" data-page="{{ page.page_id | default: 'main' }}">
  <nav class="site-nav">
    <span class="site-nav-title">{{ site.title }}</span>
    <ul>
      {% for item in site.nav %}
      <li><a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a></li>
      {% endfor %}
    </ul>
  </nav>

  <div class="page-wrap">
    <aside class="toc-sidebar" id="toc-sidebar"></aside>
    <main class="pub-content" id="pub-content">
      {{ content }}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="{{ '/assets/js/toc.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/skipcue.js' | relative_url }}"></script>
  {% for js in page.extra_js %}
  <script src="{{ js | relative_url }}"></script>
  {% endfor %}
</body>
</html>
