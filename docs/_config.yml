title: "Lazy Rudder"
description: "Axiomatic Bounds on LoRA Alignment Geometry"
baseurl: "/lazy-rudder-paper"
url: "https://d3banjan.github.io"

markdown: kramdown
kramdown:
  math_engine: null
  parse_block_html: true

plugins:
  - jekyll-seo-tag

exclude:
  - Makefile
  - scripts/
  - results/
  - lean/
  - manuscript/
  - requirements.txt
  - "*.zip"
  - "*.toml"

nav:
